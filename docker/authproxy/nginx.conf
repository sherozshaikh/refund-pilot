load_module modules/ngx_http_js_module.so;

# Static gate credentials, injected from .env via the container environment.
env GATE_USER;
env GATE_PASS;
env GATE_SECRET;

events {}

http {
    js_import auth from /etc/nginx/auth.js;

    server {
        listen 80;
        server_name _;

        # Login form + credential check (no auth_request here).
        location = /login {
            js_content auth.login;
        }

        location = /logout {
            js_content auth.logout;
        }

        # Internal auth subrequest target.
        location = /_auth {
            internal;
            js_content auth.check;
        }

        # Everything else requires a valid session cookie, else -> /login.
        location / {
            auth_request /_auth;
            error_page 401 = @login_redirect;

            proxy_pass http://frontend:80;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # keep SSE/streaming endpoints working
            proxy_set_header Connection "";
            proxy_buffering off;

            proxy_set_header Accept-Encoding "";
        }

        location @login_redirect {
            return 302 /login;
        }
    }
}
